name: backend

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo check --all-targets --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --all-targets --locked
      - name: Enforce unsafe and process boundaries
        shell: pwsh
        run: |
          $unsafeHits = rg -l 'unsafe\s*(fn|\{)' src --glob '*.rs' | Where-Object { $_ -notlike 'src\winapi_safe\*' }
          if ($unsafeHits) { throw "unsafe found outside winapi_safe: $unsafeHits" }
          $processHits = rg -l 'Command::new' src --glob '*.rs' | Where-Object { $_ -notlike 'src\core\runner\allowlist.rs' }
          if ($processHits) { throw "process spawn found outside allowlist: $processHits" }
          if (rg -n 'powershell(\.exe)?' src --glob '*.rs') { throw 'raw PowerShell reference found' }
